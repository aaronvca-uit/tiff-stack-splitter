name: Build macOS app

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "TiffStackSplitter" \
            --paths "src" \
            --collect-all PySide6 \
            run_app.py

      - name: Smoke test (imports)
        run: |
          PYTHONPATH=src python -c "import PySide6; import numpy; import tifffile; import tiff_stack_splitter; print('imports ok')"

      - name: Smoke test (run bundled executable directly)
        run: |
          "dist/TiffStackSplitter.app/Contents/MacOS/TiffStackSplitter"

      - name: Install create-dmg
        run: |
          brew update
          brew install create-dmg

      - name: Create DMG
        run: |
          rm -rf dmgroot
          mkdir -p dmgroot
          cp -R "dist/TiffStackSplitter.app" dmgroot/
          create-dmg \
            --volname "TiffStackSplitter" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            "TiffStackSplitter-macOS.dmg" \
            "dmgroot"

      - name: Upload artifact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: TiffStackSplitter-macOS
          path: TiffStackSplitter-macOS.dmg
