name: Build macOS app

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "TiffStackSplitter" \
            --paths "src" \
            --collect-all PySide6 \
            -m tiff_stack_splitter

      - name: Zip artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/TiffStackSplitter.app" "TiffStackSplitter-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiffStackSplitter-macOS
          path: TiffStackSplitter-macOS.zip
