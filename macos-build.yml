name: Build macOS app

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip show pyinstaller PySide6 tifffile numpy

      - name: Show repo tree
        run: |
          pwd
          ls -la
          find src -maxdepth 3 -type f | sort

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "TiffStackSplitter" \
            --paths "src" \
            --collect-all PySide6 \
            src/tiff_stack_splitter/__main__.py

      - name: Inspect PyInstaller outputs
        run: |
          echo "=== top level ==="
          ls -la
          echo
          echo "=== dist ==="
          ls -la dist || true
          echo
          echo "=== build ==="
          find build -maxdepth 3 -print || true
          echo
          echo "=== spec files ==="
          ls -la *.spec || true

      - name: Fail if .app is missing
        run: |
          test -d "dist/TiffStackSplitter.app"

      - name: Smoke test (imports)
        run: |
          PYTHONPATH=src python -c "import PySide6, numpy, tifffile; import tiff_stack_splitter; print('imports ok')"

      - name: Smoke test (run bundled executable directly)
        run: |
          "dist/TiffStackSplitter.app/Contents/MacOS/TiffStackSplitter" || true

      - name: Install create-dmg
        run: |
          brew install create-dmg

      - name: Create DMG
        run: |
          rm -rf dmgroot
          mkdir -p dmgroot
          cp -R "dist/TiffStackSplitter.app" dmgroot/
          create-dmg \
            --volname "TiffStackSplitter" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            "TiffStackSplitter-macOS.dmg" \
            "dmgroot"

      - name: Upload raw dist folder
        uses: actions/upload-artifact@v4
        with:
          name: raw-dist-macos
          path: dist

      - name: Upload artifact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: TiffStackSplitter-macOS
          path: TiffStackSplitter-macOS.dmg